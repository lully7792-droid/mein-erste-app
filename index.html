<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoFlow - Makler KI Dashboard</title>
    <style>
        :root {
            --bg-dark: #090d16;
            --card-bg: #131c2e;
            --accent: #10b981;
            --accent-hover: #059669;
            --text-light: #f8fafc;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.05), transparent 400px);
        }
        .container { width: 100%; max-width: 850px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.8rem; color: var(--text-light); margin-bottom: 10px; font-weight: 800; letter-spacing: -1px; }
        .subtitle { color: var(--accent); font-weight: 700; letter-spacing: 2px; font-size: 0.9rem; }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 35px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover { border-color: rgba(16, 185, 129, 0.2); }
        h2 { font-size: 1.6rem; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; font-weight: 700; }
        .description { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px; line-height: 1.6; }
        .form-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="password"], textarea, select {
            width: 100%;
            padding: 14px 18px;
            background-color: #0b111e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.2s;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); background-color: #0d1527; }
        .btn {
            background-color: var(--accent);
            color: #090d16;
            font-weight: 700;
            border: none;
            padding: 16px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        .btn:disabled { background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed; transform: none; }
        .hidden { display: none !important; }
        .credit-box { text-align: center; font-size: 1.1rem; color: var(--accent); font-weight: 700; letter-spacing: 0.5px; }
        
        .tab-navigation { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background-color: #131c2e; color: #94a3b8; border: 1px solid var(--border-color); padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .tab-btn:hover { background-color: #1e293b; color: var(--text-light); }
        .tab-btn.active { background-color: var(--accent); color: #090d16; border-color: var(--accent); }
        .dashboard-tab-content { display: block; }
        .dashboard-tab-content.hidden { display: none !important; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>ImmoFlow 🚀</h1>
        <p class="subtitle">PRODUKTIVITÄTS-BOOSTER FÜR IMMOBILIENMAKLER</p>
    </header>

    <!-- LOGIN AREA -->
    <div id="loginSection" class="card" style="max-width: 500px; margin: 0 auto;">
        <h2>🔒 Portal freischalten</h2>
        <p class="description">Bitte gib dein Makler-Passwort ein, um die gesicherten KI-Generatoren hochzufahren.</p>
        <div class="form-group">
            <label for="passwordInput">Sicherheits-Passwort</label>
            <input type="password" id="passwordInput" placeholder="Dein Passwort eingeben...">
        </div>
        <button class="btn" onclick="checkLogin()" style="width: 100%;">Dashboard freischalten →</button>
    </div>

        <!-- MAIN APP AREA (HIDDEN BEFORE LOGIN) -->
    <div id="appSection" class="hidden">
        <div class="card" style="text-align: center; padding: 20px; background: linear-gradient(135deg, #131c2e, #0b111e); border-color: rgba(16, 185, 129, 0.2);">
            <div id="creditDisplay" class="credit-box">Verbleibende Abfragen: 10</div>
        </div>

        <!-- 🎛️ REGISTER-REITER BUTTONS -->
        <div class="tab-navigation" style="margin-top: 25px;">
            <button class="tab-btn active" onclick="switchDashboardTab('tab-media')">📄 Exposé & Medien</button>
            <button class="tab-btn" onclick="switchDashboardTab('tab-finance')">💰 Finanzen & Rechner</button>
            <button class="tab-btn" onclick="switchDashboardTab('tab-leads')">🌐 Lead-Akquise</button>
            <button class="tab-btn" onclick="switchDashboardTab('tab-legal')">📜 Rhetorik & Recht</button>
            <button class="tab-btn" onclick="switchDashboardTab('tab-history')">🗄️ Verlauf & Export</button>
        </div>
