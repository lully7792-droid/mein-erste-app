<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoText AI Pro - Der Millionen-Generator</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .app-container { background-color: #1e293b; max-width: 600px; width: 100%; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-badge { background: rgba(56, 189, 248, 0.1); color: #38bdf8; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        h1 { color: white; font-size: 28px; margin: 0; font-weight: 800; }
        .subtitle { color: #94a3b8; text-align: center; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 12px; background-color: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; font-size: 14px; box-sizing: border-box; transition: all 0.2s; }
        input:focus, select:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }
        button.generate-btn { width: 100%; background: linear-gradient(135deg, #38bdf8, #0284c7); color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3); transition: all 0.2s; }
        button.generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(2, 132, 199, 0.4); }
        button.generate-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; transform: none; box-shadow: none; }
        .result-box { margin-top: 30px; background-color: #0f172a; border: 1px solid #334155; border-left: 4px solid #38bdf8; padding: 20px; border-radius: 8px; display: none; position: relative; }
        .copy-btn { position: absolute; top: 15px; right: 15px; background-color: #1e293b; color: #38bdf8; border: 1px solid #334155; padding: 6px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .copy-btn:hover { background-color: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="logo-area">
        <span class="logo-badge">Lucia Apps Premium</span>
        <h1>ImmoText AI Pro 🏠</h1>
        <div class="subtitle">Das automatisierte Makler-Imperium</div>
    </div>

    <div class="form-group">
        <label>Objekt-Typ</label>
        <select id="typ">
            <option value="Luxus-Penthouse">💎 Luxus-Penthouse</option>
            <option value="Einfamilienhaus">🏡 Modernes Einfamilienhaus</option>
            <option value="Altbauwohnung">👑 Charmante Altbauwohnung</option>
            <option value="Gewerbeimmobilie">🏢 Moderne Bürofläche / Gewerbe</option>
        </select>
    </div>

    <div class="form-group">
        <label>Schreib-Stil / Tonalität</label>
        <select id="stil">
            <option value="exklusiv, hochemotional und luxuriös">Luxuriös & Edel</option>
            <option value="sachlich, professionell und informativ">Faktenbasiert & Seriös</option>
            <option value="dringend, verkaufsstark und ein absolutes Schnäppchen betonend">Verkaufsstark & Drängend</option>
        </select>
    </div>

    <div class="form-group">
        <label>Größe (in m²)</label>
        <input type="number" id="groese" value="120">
    </div>

    <div class="form-group">
        <label>Besondere Premium-Merkmale</label>
        <input type="text" id="features" value="Dachterrasse, Einbauküche, Fußbodenheizung, KNX-Smart-Home">
    </div>

    <button onclick="generiereText()" id="btn" class="generate-btn">Echtes KI-Exposé erstellen</button>

    <div class="result-box" id="ergebnisBox">
        <button onclick="kopiereText()" class="copy-btn" id="copyBtn">Text kopieren</button>
        <h3 style="margin-top:0; color:#38bdf8; font-size: 16px;">Dein KI-Verkaufstext:</h3>
        <p id="ergebnisText" style="line-height: 1.7; font-size: 14px; color: #e2e8f0; white-space: pre-line; margin-bottom: 0; padding-top: 10px;"></p>
    </div>
</div>

<script>
async function generiereText() {
    const btn = document.getElementById("btn");
    const typ = document.getElementById("typ").value;
    const stil = document.getElementById("stil").value;
    const groese = document.getElementById("groese").value;
    const features = document.getElementById("features").value;
    
    btn.innerText = "KI schreibt Verkaufs-Schlager...";
    btn.disabled = true;

    try {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ typ, stil, groese, features })
        });
        
        const data = await response.json();
        
        if(data.error) {
            document.getElementById("ergebnisText").innerText = data.error;
        } else {
            document.getElementById("ergebnisText").innerText = data.text;
        }
    } catch (error) {
        document.getElementById("ergebnisText").innerText = "Server antwortet nicht. Läuft das Terminal noch?";
    }

    document.getElementById("ergebnisBox").style.display = "block";
    btn.innerText = "Echtes KI-Exposé erstellen";
    btn.disabled = false;
}

function kopiereText() {
    const text = document.getElementById("ergebnisText").innerText;
    navigator.clipboard.writeText(text);
    const copyBtn = document.getElementById("copyBtn");
    copyBtn.innerText = "Kopiert! ✓";
    setTimeout(() => { copyBtn.innerText = "Text kopieren"; }, 2000);
}
</script>

</body>
</html>
