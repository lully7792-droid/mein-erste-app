<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoText AI Pro — Enterprise Platform</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #10b981;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #93c5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .flex-group {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .flex-group .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input, textarea, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-size: 15px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        select option {
            background: #0b0f19;
            color: #fff;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        #loginSection {
            text-align: center;
        }

        #appSection {
            display: none;
        }

        .output-box {
            margin-top: 32px;
            border-top: 1px solid var(--border-color);
            padding-top: 32px;
            display: none;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            width: auto;
        }

        #result {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 0 auto 12px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>ImmoText AI Pro</h1>
    <div class="subtitle">Enterprise-Plattform für Immobilien-Umsätze</div>

    <!-- 🔒 LOGIN BEREICH -->
    <div id="loginSection">
        <div class="form-group" style="margin-top: 20px;">
            <label for="passwordInput">Enterprise Lizenzschlüssel eingeben</label>
            <input type="password" id="passwordInput" placeholder="Dein geheimes Passwort">
        </div>
        <button onclick="checkLogin()">Plattform freischalten</button>
    </div>

    <!-- 🏗️ HAUPT APP BEREICH -->
    <div id="appSection">
        <div class="form-group">
            <label for="title">Objekttitel / Typ</label>
            <input type="text" id="title" placeholder="z.B. Luxuriöses Penthouse, Moderner Altbautraum">
        </div>

        <div class="flex-group">
            <div class="form-group">
                <label for="size">Wohnfläche (m²)</label>
                <input type="number" id="size" placeholder="120">
            </div>
            <div class="form-group">
                <label for="rooms">Zimmer</label>
                <input type="number" id="rooms" placeholder="4">
            </div>
        </div>

        <div class="flex-group">
            <div class="form-group">
                <label for="price">Kaufpreis (€)</label>
                <input type="text" id="price" placeholder="z.B. 650.000">
            </div>
            <div class="form-group">
                <label for="year">Baujahr</label>
                <input type="number" id="year" placeholder="z.B. 2022">
            </div>
            <div class="form-group">
                <label for="energy">Energieklasse</label>
                <select id="energy">
                    <option value="Nicht angegeben">Auswählen...</option>
                    <option value="A+">A+</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>
        </div>

        <div class="flex-group">
            <div class="form-group">
                <label for="location">Lage / Stadtteil</label>
                <input type="text" id="location" placeholder="z.B. Wuppertal Elberfeld, Hamburg HafenCity">
            </div>
            <div class="form-group">
                <label for="tone">Verkaufs-Stil (Tonfall)</label>
                <select id="tone">
                    <option value="luxuriös, elitär und elegant">Luxuriös & Edel</option>
                    <option value="modern, locker, einladend und frisch">Modern & Locker</option>
                    <option value="kurz, knackig, emotional und perfekt für Social Media">Social Media Post</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="features">Premium-Merkmale (Mit Komma trennen)</label>
            <textarea id="features" rows="3" placeholder="z.B. Dachterrasse, Einbauküche, Fußbodenheizung, KNX-Smart-Home"></textarea>
        </div>

        <button id="generateBtn" onclick="generateExpose()">Premium KI-Exposé generieren</button>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <span>Die KI analysiert die Objektdaten und verfasst den Text...</span>
        </div>

        <div class="output-box" id="outputBox">
            <div class="output-header">
                <label style="color: var(--accent);">✔ Generiertes Exposé:</label>
                <button class="btn-copy" onclick="copyText()">Text kopieren</button>
            </div>
            <div id="result"></div>
        </div>
    </div>
</div>

<script>
    let savedPassword = "";

    function checkLogin() {
        const pass = document.getElementById('passwordInput').value;
        if(!pass) { alert('Bitte Passwort eingeben!'); return; }
        
        savedPassword = pass;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('appSection').style.display = 'block';
    }

    async function generateExpose() {
        const title = document.getElementById('title').value;
        const size = document.getElementById('size').value;
        const rooms = document.getElementById('rooms').value;
        const price = document.getElementById('price').value;
        const year = document.getElementById('year').value;
        const energy = document.getElementById('energy').value;
        const location = document.getElementById('location').value;
        const tone = document.getElementById('tone').value;
        const features = document.getElementById('features').value;

        if(!title || !location) {
            alert('Bitte mindestens Titel und Lage ausfüllen!');
            return;
        }

        const btn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const outputBox = document.getElementById('outputBox');
        const resultDiv = document.getElementById('result');

        btn.style.display = 'none';
        outputBox.style.display = 'none';
        loader.style.display = 'block';

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    title, size, rooms, price, year, energy, location, tone, features,
                    password: savedPassword
                })
            });

            const data = await response.json();
            if(data.success) {
                resultDiv.innerText = data.text;
            } else {
                resultDiv.innerText = "Fehler: " + data.error;
            }
            outputBox.style.display = 'block';
        } catch (e) {
            resultDiv.innerText = "Verbindungsfehler zum Server.";
            outputBox.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            btn.style.display = 'block';
        }
    }

    function copyText() {
        navigator.clipboard.writeText(document.getElementById('result').innerText);
        alert('In Zwischenablage kopiert!');
    }
</script>
</body>
</html>
