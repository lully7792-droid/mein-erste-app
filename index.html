<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoText AI Pro — Premium Exposé Generator</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #93c5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-size: 15px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background: #1e293b;
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .output-box {
            margin-top: 32px;
            border-top: 1px solid var(--border-color);
            padding-top: 32px;
            display: none;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            width: auto;
            margin: 0;
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        #result {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 12px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ImmoText AI Pro</h1>
    <div class="subtitle">Das Software-Werkzeug für Premium-Immobilienmakler</div>

    <div class="form-group">
        <label for="title">Objekttitel / Typ</label>
        <input type="text" id="title" placeholder="z.B. Luxuriöses Penthouse, Moderner Altbautraum">
    </div>

    <div class="form-group" style="display: flex; gap: 16px;">
        <div style="flex: 1;">
            <label for="size">Wohnfläche (m²)</label>
            <input type="number" id="size" placeholder="z.B. 120">
        </div>
        <div style="flex: 1;">
            <label for="rooms">Zimmer</label>
            <input type="number" id="rooms" placeholder="z.B. 4">
        </div>
    </div>

    <div class="form-group">
        <label for="location">Lage / Stadtteil</label>
        <input type="text" id="location" placeholder="z.B. Hamburg HafenCity, Berlin Mitte">
    </div>

    <div class="form-group">
        <label for="features">Premium-Merkmale (Mit Komma trennen)</label>
        <textarea id="features" rows="3" placeholder="z.B. Dachterrasse, Fußbodenheizung, KNX-Smart-Home, Einbauküche"></textarea>
    </div>

    <button id="generateBtn" onclick="generateExpose()">Echtes KI-Exposé erstellen</button>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <span>Die künstliche Intelligenz schreibt Ihr Premium-Exposé...</span>
    </div>

    <div class="output-box" id="outputBox">
        <div class="output-header">
            <label>Dein KI-Verkaufstext:</label>
            <button class="btn-copy" onclick="copyText()">Text kopieren</button>
        </div>
        <div id="result"></div>
    </div>
</div>

<script>
    async function generateExpose() {
        const title = document.getElementById('title').value;
        const size = document.getElementById('size').value;
        const rooms = document.getElementById('rooms').value;
        const location = document.getElementById('location').value;
        const features = document.getElementById('features').value;
        
        const btn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const outputBox = document.getElementById('outputBox');
        const resultDiv = document.getElementById('result');

        if(!title || !location) {
            alert('Bitte füllen Sie mindestens Objekttitel und Lage aus!');
            return;
        }

        btn.style.display = 'none';
        outputBox.style.display = 'none';
        loader.style.display = 'block';

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, size, rooms, location, features })
            });

            const data = await response.json();
            
            if (data.success) {
                resultDiv.innerText = data.text;
                outputBox.style.display = 'block';
            } else {
                resultDiv.innerText = "Die KI hat gerade Schluckauf. Fehler: " + data.error;
                outputBox.style.display = 'block';
            }
        } catch (error) {
            resultDiv.innerText = "Server-Fehler beim Aufruf der KI.";
            outputBox.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            btn.style.display = 'block';
        }
    }

    function copyText() {
        const text = document.getElementById('result').innerText;
        navigator.clipboard.writeText(text);
        alert('Exposé-Text wurde in die Zwischenablage kopiert!');
    }
</script>

</body>
</html>
